baseURL = 'https://tech-blog-auto.vercel.app/'
languageCode = "zh-cn"
title = '丁先森的技术博客'
theme = "paper"

[params]
  author = "丁先森"
  description = "Java、Spring Boot、大数据与 AI Agent 实战教程。每天一篇技术干货，帮你提升开发技能、探索副业可能。"
  name = "丁先森"
  bio = "Java / 大数据开发者，探索 AI 自动化与副业可能性"
  # mainSections controls which content sections appear on the homepage
  mainSections = ["posts"]

# Google Search Console verification
[params.verification]
  google = "PmyIlNFTS9Rf3zqtQLawIqiUt-Baunkz1NuEVkg49jw"
#   bing = "xxxxxxxxxxx"

# Google Analytics (替换 G-XXXXXXXXXX 为你的 GA4 测量 ID)
# [services.googleAnalytics]
#   ID = "G-XXXXXXXXXX"

[menu]
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 1

# RSS 不要用默认的 index.xml，否则 Vercel 根路径会优先返回 XML 而非 HTML 首页
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "rss"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
