baseURL = 'https://tech-blog-auto.vercel.app/'
# languageCode = 'en-us'
languageCode = "zh-cn"
title = '技术分享博客'
theme = "paper"


[params]
  author = "丁先森"
  description = "ai 自动更新的 Java、大数据与 AI 技术摘要"

[menu]
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 1

# RSS 不要用默认的 index.xml，否则 Vercel 根路径会优先返回 XML 而非 HTML 首页
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "rss"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5